apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: aws-pool
  namespace: metallb-system
spec:
  addresses:
    - 172.18.255.205-172.18.255.224
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: aws-l2-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
    - aws-pool
