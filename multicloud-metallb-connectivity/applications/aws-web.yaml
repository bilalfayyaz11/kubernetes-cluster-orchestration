apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-web-config
  namespace: multicloud
data:
  default.conf: |
    server {
      listen 80;

      location / {
        default_type text/plain;
        return 200 "Hello from AWS Cluster\n";
      }

      location /health {
        default_type text/plain;
        return 200 "OK";
      }

      location /info {
        default_type application/json;
        return 200 '{"cluster":"aws","region":"us-east-1"}';
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-web
  namespace: multicloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aws-web
  template:
    metadata:
      labels:
        app: aws-web
    spec:
      containers:
      - name: nginx
        image: nginx:1.29-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: config
        configMap:
          name: aws-web-config
---
apiVersion: v1
kind: Service
metadata:
  name: aws-web
  namespace: multicloud
  annotations:
    metallb.io/address-pool: aws-pool
spec:
  selector:
    app: aws-web
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
