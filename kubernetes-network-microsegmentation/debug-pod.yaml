apiVersion: v1
kind: Pod
metadata:
  name: network-debug
  namespace: diagnostics
  labels:
    app: network-debug
    role: diagnostics
spec:
  restartPolicy: Never
  containers:
    - name: network-tools
      image: nicolaka/netshoot:latest
      imagePullPolicy: IfNotPresent
      command:
        - /bin/bash
        - -c
      args:
        - sleep infinity
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
