kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
- role: control-plane

  extraPortMappings:
  - containerPort: 30000
    hostPort: 30000
    listenAddress: "127.0.0.1"
    protocol: TCP

  - containerPort: 30001
    hostPort: 30001
    listenAddress: "127.0.0.1"
    protocol: TCP

  extraMounts:
  - hostPath: /home/ubuntu/kubernetes-disaster-recovery/storage/minio
    containerPath: /var/local/minio-backups

- role: worker

- role: worker
