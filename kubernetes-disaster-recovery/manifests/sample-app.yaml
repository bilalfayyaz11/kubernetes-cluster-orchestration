apiVersion: v1
kind: Namespace
metadata:
  name: recovery-demo

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: web-data
  namespace: recovery-demo
spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  namespace: recovery-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-demo

  template:

    metadata:
      labels:
        app: nginx-demo

    spec:

      containers:

      - name: nginx

        image: nginx:1.27-alpine

        ports:
        - containerPort: 80

        volumeMounts:
        - name: web-data
          mountPath: /usr/share/nginx/html

      volumes:

      - name: web-data
        persistentVolumeClaim:
          claimName: web-data

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-demo
  namespace: recovery-demo

spec:
  selector:
    app: nginx-demo

  ports:
  - port: 80

