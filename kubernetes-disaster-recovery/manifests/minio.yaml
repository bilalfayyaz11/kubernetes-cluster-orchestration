apiVersion: v1
kind: Namespace
metadata:
  name: backup-storage

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: minio-data
spec:
  capacity:
    storage: 5Gi
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /var/local/minio-backups
    type: DirectoryOrCreate

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: backup-storage
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: manual
  volumeName: minio-data
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: backup-storage
  labels:
    app: minio
spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: minio

  template:
    metadata:
      labels:
        app: minio

    spec:
      nodeSelector:
        kubernetes.io/hostname: recovery-control-plane

      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      containers:
      - name: minio
        image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
        imagePullPolicy: IfNotPresent

        args:
        - server
        - /data
        - --console-address
        - :9001

        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: root-user

        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: root-password

        ports:
        - name: api
          containerPort: 9000

        - name: console
          containerPort: 9001

        readinessProbe:
          httpGet:
            path: /minio/health/ready
            port: api
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12

        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: api
          initialDelaySeconds: 30
          periodSeconds: 10

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi

        volumeMounts:
        - name: data
          mountPath: /data

      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: minio-data

---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: backup-storage
spec:
  type: NodePort

  selector:
    app: minio

  ports:
  - name: api
    port: 9000
    targetPort: api
    nodePort: 30000

  - name: console
    port: 9001
    targetPort: console
    nodePort: 30001
