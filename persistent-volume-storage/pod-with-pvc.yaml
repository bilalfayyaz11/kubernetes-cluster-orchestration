apiVersion: v1
kind: Pod
metadata:
  name: storage-pod
  labels:
    app: storage-test
spec:
  containers:
    - name: storage-container
      image: nginx:1.29-alpine
      imagePullPolicy: IfNotPresent
      ports:
        - name: http
          containerPort: 80
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
      volumeMounts:
        - name: storage-volume
          mountPath: /usr/share/nginx/html
  volumes:
    - name: storage-volume
      persistentVolumeClaim:
        claimName: local-pvc
  restartPolicy: Always
