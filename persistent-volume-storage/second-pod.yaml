apiVersion: v1
kind: Pod
metadata:
  name: second-storage-pod
spec:
  containers:
    - name: busybox
      image: busybox:1.37
      command:
        - sh
        - -c
        - while true; do sleep 30; done
      volumeMounts:
        - name: storage
          mountPath: /data
  restartPolicy: Always
  volumes:
    - name: storage
      persistentVolumeClaim:
        claimName: local-pvc
