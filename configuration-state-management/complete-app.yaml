apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-complete
data:
  app.yaml: |
    server:
      port: 8080
      host: "0.0.0.0"
    logging:
      level: "INFO"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets-complete
type: Opaque
data:
  db_password: cG9zdGdyZXNfcGFzc3dvcmQ=
  jwt_secret: and0X3NlY3JldF9rZXlfMTIz
  api_token: YWJjZGVmZ2hpams=
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: complete-app
  labels:
    app: complete-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: complete-app
  template:
    metadata:
      labels:
        app: complete-app
    spec:
      containers:
      - name: app
        image: nginx:1.21
        ports:
        - containerPort: 8080
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets-complete
              key: db_password
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config
        - name: secret-volume
          mountPath: /etc/secrets
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: app-config-complete
      - name: secret-volume
        secret:
          secretName: app-secrets-complete
