apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  labels:
    app: web-server
data:
  nginx.conf: |
    server {
        listen 80;
        server_name localhost;
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
        }
    }
  index.html: |
    <!DOCTYPE html>
    <html>
    <body>
        <h1>Welcome to ConfigMap Demo</h1>
        <p>This content is loaded from a ConfigMap!</p>
    </body>
    </html>
