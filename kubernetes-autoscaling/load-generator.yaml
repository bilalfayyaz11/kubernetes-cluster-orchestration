apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
spec:
  replicas: 5
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
        - name: load-generator
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              while true; do
                wget -q -O- http://php-apache.default.svc.cluster.local >/dev/null
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
