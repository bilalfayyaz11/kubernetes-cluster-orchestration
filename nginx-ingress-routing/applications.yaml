apiVersion: v1
kind: ConfigMap
metadata:
  name: default-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Default Backend</title>
      <style>
        body { font-family: Arial, sans-serif; background-color: #ffebee; text-align: center; padding: 50px; }
        h1 { color: #c62828; }
      </style>
    </head>
    <body>
      <h1>Default Backend</h1>
      <p>No matching ingress route was found.</p>
      <p>Available paths: /app1 and /app2</p>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: default-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: default-backend
  template:
    metadata:
      labels:
        app: default-backend
    spec:
      containers:
        - name: default-backend
          image: nginx:1.28-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: html
          configMap:
            name: default-html
---
apiVersion: v1
kind: Service
metadata:
  name: default-backend-service
spec:
  selector:
    app: default-backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
